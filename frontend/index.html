<!DOCTYPE html>
<html>

<head>

<title>Blockchain Waste Tracking System</title>

<style>

body{
font-family: Arial, sans-serif;
background-image:url("bg.jpg");
background-size:cover;
margin:0;
}

/* Header */

.header{
background:rgba(0,0,0,0.8);
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

/* Stats */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
border-radius:10px;
width:160px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

.card h2{
margin:0;
color:#2c7be5;
}

/* Form */

.container{
width:450px;
background:rgba(255,255,255,0.9);
margin:40px auto;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#1a5fd0;
}

/* Table */

.table-container{
width:90%;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.download-btn{
width:200px;
margin:20px auto;
display:block;
background:green;
}

.search-box{
text-align:center;
margin:20px;
}

</style>

</head>

<body>

<div class="header">
Blockchain Enabled Waste Tracking System
</div>

<div class="stats">

<div class="card">
<h2 id="totalWaste">0</h2>
<p>Total</p>
</div>

<div class="card">
<h2 id="collectedCount">0</h2>
<p>Collected</p>
</div>

<div class="card">
<h2 id="transportedCount">0</h2>
<p>Transported</p>
</div>

<div class="card">
<h2 id="recycledCount">0</h2>
<p>Recycled</p>
</div>

<div class="card">
<h2 id="disposedCount">0</h2>
<p>Disposed</p>
</div>

</div>

<div class="container">

<h3>Enter Waste Details</h3>

<input id="type" placeholder="Waste Type">
<input id="source" placeholder="Waste Source">
<input id="collector" placeholder="Collector Name">
<input id="destination" placeholder="Destination">

<select id="status">
<option>Collected</option>
<option>Transported</option>
<option>Recycled</option>
<option>Disposed</option>
</select>

<button onclick="addWaste()">Add Waste Record</button>

</div>

<div class="search-box">

<input id="searchID" placeholder="Search Waste ID">
<button onclick="searchWaste()">Search</button>

</div>

<div class="table-container">

<h3 style="text-align:center;">Waste Tracking Records</h3>

<table id="wasteTable">

<tr>
<th>Waste ID</th>
<th>Waste Type</th>
<th>Source</th>
<th>Collector</th>
<th>Destination</th>
<th>Status</th>
<th>Timestamp</th>
</tr>

</table>

<button class="download-btn" onclick="downloadCSV()">
Download Waste Report
</button>

</div>

<script>

var wasteID=1;

var collected=0;
var transported=0;
var recycled=0;
var disposed=0;

function addWaste(){

var type=document.getElementById("type").value;
var source=document.getElementById("source").value;
var collector=document.getElementById("collector").value;
var destination=document.getElementById("destination").value;
var status=document.getElementById("status").value;

if(type=="" || source=="" || collector=="" || destination==""){
alert("Please fill all fields");
return;
}

var table=document.getElementById("wasteTable");

var row=table.insertRow();

var time=new Date().toLocaleString();

row.insertCell(0).innerHTML=wasteID;
row.insertCell(1).innerHTML=type;
row.insertCell(2).innerHTML=source;
row.insertCell(3).innerHTML=collector;
row.insertCell(4).innerHTML=destination;
row.insertCell(5).innerHTML=status;
row.insertCell(6).innerHTML=time;

if(status=="Collected") collected++;
if(status=="Transported") transported++;
if(status=="Recycled") recycled++;
if(status=="Disposed") disposed++;

document.getElementById("collectedCount").innerText=collected;
document.getElementById("transportedCount").innerText=transported;
document.getElementById("recycledCount").innerText=recycled;
document.getElementById("disposedCount").innerText=disposed;

wasteID++;

document.getElementById("totalWaste").innerText=wasteID-1;

document.getElementById("type").value="";
document.getElementById("source").value="";
document.getElementById("collector").value="";
document.getElementById("destination").value="";

}

function searchWaste(){

var input=document.getElementById("searchID").value;
var rows=document.getElementById("wasteTable").rows;

for(var i=1;i<rows.length;i++){

if(rows[i].cells[0].innerHTML==input){
rows[i].style.background="yellow";
rows[i].scrollIntoView();
}else{
rows[i].style.background="";
}

}

}

function downloadCSV(){

var table=document.getElementById("wasteTable");
var csv=[];

for(var i=0;i<table.rows.length;i++){

var row=[];
var cols=table.rows[i].cells;

for(var j=0;j<cols.length;j++){
row.push(cols[j].innerText);
}

csv.push(row.join(","));

}

var csvFile=new Blob([csv.join("\n")],{type:"text/csv"});

var link=document.createElement("a");
link.download="waste_report.csv";
link.href=window.URL.createObjectURL(csvFile);
link.click();

}

</script>

</body>

</html>
